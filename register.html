<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="register_style.css">
</head>
<body>
    <div id="main">
        <h1>Create Account</h1>
        <form onsubmit="return registerUser()">
            <label for="name">NAME:</label>
            <input id="name" type="text" name="name" placeholder="Full name" required>
            <span id="nameerror" class="error"></span>

            <label for="email">EMAIL:</label>
            <input id="email" type="email" name="email" placeholder="Email" required>
            <span id="emailerror" class="error"></span>

            <label for="password">PASSWORD:</label>
            <input id="password" type="password" name="password" placeholder="Password" required>
            <span id="passworderror" class="error"></span>

            <input type="submit" value="Create Account" />
        </form>
        <p>Already have an account? <a href="loging.html">Login here</a></p>
    </div>

    <script>
        function registerUser() {
            var name = document.getElementById("name").value.trim();
            var email = document.getElementById("email").value.trim();
            var password = document.getElementById("password").value;

            // Check if user already exists
            var existingUser = localStorage.getItem(email);
            if (existingUser) {
                document.getElementById("emailerror").innerText = "User already exists. Please use a different email.";
                return false;
            }

            // Store user data in localStorage
            var userData = {
                name: name,
                email: email,
                password: password
            };
            localStorage.setItem(email, JSON.stringify(userData));

            alert("Account created successfully! You can now log in.");
            window.location.href = "loging.html"; // Redirect to login page
            return false; // Prevent form submission
        }
    </script>
</body>
</html>
