<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <script>
        // Check if the user is logged in
        if (localStorage.getItem("loggedIn") !== "true") {
            // If not logged in, redirect to login page
            window.location.href = "login.html";
        }

        // Optionally display the user's name
        var loggedInUser = localStorage.getItem("loggedInUser");
        if (loggedInUser) {
            document.addEventListener("DOMContentLoaded", function() {
                document.getElementById("welcomeMessage").innerText = "Welcome, " + loggedInUser + "!";
            });
        }
    </script>
</head>
<body>
    <div id="main">
        <h1 id="welcomeMessage">Welcome to the Home Page!</h1>
        <p>This is a protected page. You can only access this after logging in.</p>
        <a href="logout.html">Logout</a>
    </div>
</body>
</html>
